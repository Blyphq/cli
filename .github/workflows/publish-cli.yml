name: Publish CLI to npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish-cli:
    name: Publish @blyp/cli
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.0"
          registry-url: "https://registry.npmjs.org"

      - name: Print tool versions
        run: |
          echo "node $(node --version)"
          echo "bun $(bun --version)"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches CLI package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./packages/cli/package.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match packages/cli version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Check CLI types
        run: bun run check-types:cli

      - name: Run CLI tests
        run: bun run --cwd packages/cli test

      - name: Build CLI
        run: bun run build:cli

      - name: Dump CLI build diagnostics
        if: ${{ failure() }}
        run: |
          echo "node $(node --version)"
          echo "bun $(bun --version)"

          echo "apps/web/dist/server/assets"
          find apps/web/dist/server/assets -maxdepth 1 -type f -name '*.js' | sort || true

          echo "packages/cli/studio/server/assets"
          find packages/cli/studio/server/assets -maxdepth 1 -type f -name '*.js' | sort || true

          echo "verify:studio-runtime-deps"
          bun run --cwd packages/cli verify:studio-runtime-deps || true

          echo "built-in imports in packaged Studio server"
          if command -v rg >/dev/null 2>&1; then
            rg -n '^(import .+ from |import )"((node:)?(buffer|crypto|events|fs|net|os|path|perf_hooks|process|stream|string_decoder|timers|tls|url|util|zlib)(/[^"]*)?)"' \
              packages/cli/studio/server/assets \
              -g '*.js' \
              -S || true
          fi

          shopt -s nullglob
          for file in packages/cli/studio/server/assets/*.js; do
            echo "--- $file"
            sed -n '1,80p' "$file"
          done

      - name: Smoke test packaged Studio
        run: bun run --cwd packages/cli smoke:packaged-studio

      - name: Publish @blyp/cli
        working-directory: packages/cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
