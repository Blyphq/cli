name: Publish CLI to npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish-cli:
    name: Publish @blyp/cli
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches CLI package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./packages/cli/package.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match packages/cli version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Check CLI types
        run: bun run check-types:cli

      - name: Run CLI tests
        run: bun run --cwd packages/cli test

      - name: Build CLI
        run: bun run build:cli

      - name: Publish @blyp/cli
        working-directory: packages/cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
